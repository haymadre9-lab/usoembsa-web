<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#C62828">
<title>USO emb</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="USO emb">
<style>
:root{
  --rojo:#C62828; --rojo-osc:#8B0000; --rojo-claro:#EF5350;
  --bg:#FFFBFA; --surface:#FFFFFF; --surface-var:#F4DDDB;
  --on-bg:#201A1A; --on-var:#534343; --outline:#857372;
  --azul:#1565C0; --verde:#388E3C; --naranja:#F57C00;
  --teal:#00897B; --violeta:#7B1FA2; --gris:#455A64;
  --radius:20px; --shadow:0 2px 12px rgba(0,0,0,.08);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#141010; --surface:#241E1E; --surface-var:#534343;
    --on-bg:#EDE0DF; --on-var:#D8C2C0; --outline:#A08C8B;
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--on-bg);overscroll-behavior-y:contain}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;font-size:16px}
.hidden{display:none!important}
a{color:var(--azul)}

/* Layout */
#app{max-width:680px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.screen{flex:1;display:flex;flex-direction:column;animation:slideIn .32s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* AppBar */
.appbar{display:flex;align-items:center;gap:12px;padding:14px 16px;
  padding-top:calc(14px + env(safe-area-inset-top));
  background:var(--rojo);color:#fff;position:sticky;top:0;z-index:10}
.appbar h1{font-size:20px;margin:0;font-weight:700;flex:1}
.appbar button{color:#fff;font-size:22px;width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center}
.appbar button:active{background:rgba(255,255,255,.2)}

/* Hero header (pantalla principal) */
.hero{background:linear-gradient(160deg,#D32F2F,#B71C1C 55%,#8B0000);
  color:#fff;padding:24px 22px;padding-top:calc(28px + env(safe-area-inset-top));
  border-radius:0 0 32px 32px;display:flex;align-items:center;gap:14px}
.hero .logo{width:56px;height:56px;border-radius:50%;background:#fff;
  display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(0,0,0,.25)}
.hero .logo span{width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#E53935,#8B0000)}
.hero .titles{flex:1}
.hero .titles b{font-size:28px;font-weight:800;display:inline}
.hero .titles i{font-size:20px;color:#FFE0E0;margin-left:4px}
.hero .titles small{display:block;color:#FFD0D0;font-size:13px;margin-top:2px}

/* Contenido scrollable */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:24px}
.section-title{font-size:16px;font-weight:600;padding:16px 20px 8px}

/* Grid de menú */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:8px 16px}
.card{background:var(--surface);border-radius:24px;padding:14px;min-height:148px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04);
  position:relative;transition:transform .15s,box-shadow .15s}
.card:active{transform:scale(.95)}
.card svg{width:64px;height:64px}
.card .label{margin-top:8px;font-size:14px;font-weight:600;text-align:center}
.card .badge{position:absolute;top:8px;right:8px;background:linear-gradient(135deg,#EF5350,#B71C1C);
  color:#fff;min-width:24px;height:24px;border-radius:12px;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 7px;box-shadow:0 2px 6px rgba(0,0,0,.3)}

/* Actividad reciente */
.recent{display:flex;gap:12px;overflow-x:auto;padding:4px 16px 8px;-webkit-overflow-scrolling:touch}
.recent::-webkit-scrollbar{display:none}
.recent-card{flex:0 0 220px;background:var(--surface);border-radius:18px;padding:12px;
  box-shadow:var(--shadow);display:flex;gap:10px;align-items:center}
.recent-card svg{width:42px;height:42px;flex-shrink:0}
.recent-card .rc-cat{font-size:11px;font-weight:700;text-transform:uppercase}
.recent-card .rc-title{font-size:14px;font-weight:600;margin:2px 0;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.recent-card .rc-date{font-size:12px;color:var(--on-var)}

/* Listas de contenido */
.list{padding:12px 16px;display:flex;flex-direction:column;gap:12px}
.item{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);
  animation:fadeIn .3s ease}
.item .it-cat{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--rojo)}
.item .it-title{font-size:17px;font-weight:700;margin:4px 0}
.item .it-body{font-size:15px;color:var(--on-var);white-space:pre-wrap;line-height:1.4}
.item .it-date{font-size:13px;color:var(--on-var);margin-top:8px}
.item .it-file{display:inline-flex;align-items:center;gap:6px;margin-top:10px;
  background:var(--surface-var);color:var(--on-var);padding:8px 14px;border-radius:20px;
  font-size:14px;font-weight:600;text-decoration:none}
.item .it-del{float:right;color:var(--rojo);font-size:14px;font-weight:600}

.empty{text-align:center;color:var(--on-var);padding:60px 30px}
.empty svg{width:72px;height:72px;opacity:.5;margin-bottom:16px}

/* FAB */
.fab{position:fixed;bottom:24px;right:calc(50% - 340px + 24px);width:60px;height:60px;border-radius:30px;
  background:var(--rojo);color:#fff;font-size:30px;box-shadow:0 6px 20px rgba(198,40,40,.5);
  display:flex;align-items:center;justify-content:center;z-index:20}
@media(max-width:680px){.fab{right:24px}}
.fab:active{transform:scale(.92)}

/* Login */
.login{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 30px;text-align:center}
.login .biglogo{width:96px;height:96px;border-radius:50%;background:var(--rojo);
  display:flex;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 8px 24px rgba(198,40,40,.4)}
.login .biglogo span{width:60px;height:60px;border-radius:50%;background:#fff}
.login h2{font-size:26px;margin:0 0 8px}
.login p{color:var(--on-var);margin:0 0 28px}
.login input{width:100%;max-width:300px;padding:16px;border-radius:16px;border:2px solid var(--outline);
  background:var(--surface);color:var(--on-bg);text-align:center;font-size:20px;letter-spacing:2px;margin-bottom:16px}
.login input:focus{outline:none;border-color:var(--rojo)}
.btn{background:var(--rojo);color:#fff;padding:16px 32px;border-radius:16px;font-size:17px;
  font-weight:700;width:100%;max-width:300px;box-shadow:0 4px 12px rgba(198,40,40,.3)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5}
.btn-sec{background:var(--surface-var);color:var(--on-bg);box-shadow:none}
.err{color:var(--rojo);font-weight:600;margin:8px 0;min-height:20px}

/* Chat IA */
.chat{flex:1;display:flex;flex-direction:column}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.bubble{max-width:80%;padding:12px 16px;border-radius:18px;font-size:15px;line-height:1.45;white-space:pre-wrap}
.bubble.user{align-self:flex-end;background:var(--rojo);color:#fff;border-bottom-right-radius:4px}
.bubble.ai{align-self:flex-start;background:var(--surface-var);color:var(--on-bg);border-bottom-left-radius:4px}
.bubble.err{align-self:flex-start;background:#FFDAD6;color:#410002;font-size:14px}
.chat-welcome{padding:30px 24px;text-align:center}
.chat-welcome .ico{width:80px;height:80px;border-radius:50%;margin:0 auto 20px;
  background:linear-gradient(135deg,var(--rojo),var(--naranja));display:flex;align-items:center;justify-content:center;font-size:40px}
.sug{background:var(--surface-var);color:var(--on-var);padding:12px 16px;border-radius:16px;
  margin:8px 0;text-align:left;font-size:15px;width:100%}
.sug:active{background:var(--outline);color:#fff}
.chat-input{display:flex;gap:8px;padding:10px 12px;padding-bottom:calc(10px + env(safe-area-inset-bottom));
  background:var(--surface);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.chat-input textarea{flex:1;border:1px solid var(--outline);border-radius:24px;padding:12px 16px;
  resize:none;max-height:100px;background:var(--bg);color:var(--on-bg)}
.chat-input button{width:48px;height:48px;border-radius:24px;background:var(--rojo);color:#fff;
  font-size:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;
  justify-content:center;z-index:100;animation:fadeIn .2s}
.modal{background:var(--surface);width:100%;max-width:680px;border-radius:24px 24px 0 0;padding:24px;
  padding-bottom:calc(24px + env(safe-area-inset-bottom));animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal h3{margin:0 0 16px}
.modal input,.modal textarea,.modal select{width:100%;padding:14px;border-radius:12px;
  border:1px solid var(--outline);background:var(--bg);color:var(--on-bg);margin-bottom:12px}
.modal textarea{min-height:90px;resize:vertical}
.modal-actions{display:flex;gap:10px;margin-top:8px}
.modal-actions .btn{flex:1}

/* Spinner */
.spinner{width:22px;height:22px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
.spinner.dark{border-color:rgba(0,0,0,.2);border-top-color:var(--rojo)}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-full{flex:1;display:flex;align-items:center;justify-content:center;padding:60px}

/* Toast */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;
  padding:12px 20px;border-radius:24px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;max-width:90%}
#toast.show{opacity:1}

/* Sub-tabs (calendarios) */
.tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 16px;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 18px;border-radius:20px;background:var(--surface-var);
  color:var(--on-var);font-size:14px;font-weight:600;white-space:nowrap}
.tab.active{background:var(--rojo);color:#fff}
</style>
</head>
<body>
<div id="app"><div class="loading-full"><div class="spinner dark"></div></div></div>
<div id="toast"></div>

<script src="config.js"></script>
<script src="icons.js"></script>
<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(e=>console.warn('SW:',e));
}
</script>
</body>
</html>
